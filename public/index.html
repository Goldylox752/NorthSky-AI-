<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NorthSky AI Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    input, button {
      padding: 12px;
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 NorthSky AI</h1>
    <p>Paste a URL to extract metadata</p>

    <input id="url" placeholder="https://example.com" />
    <button onclick="runRip()">Analyze</button>

    <div class="card">
      <h3>Result</h3>
      <pre id="output">Waiting...</pre>
    </div>
  </div>

  <script>
    const API_BASE = "https://northsky-ai.onrender.com";
    const API_KEY = "your-super-secret-key";

    async function runRip() {
      const url = document.getElementById("url").value;

      const res = await fetch(`${API_BASE}/rip?url=${encodeURIComponent(url)}`, {
        headers: {
          "x-api-key": API_KEY
        }
      });

      const data = await res.json();
      document.getElementById("output").innerText = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
