<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NorthSky Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo { font-weight:700; }

button {
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:white;
  cursor:pointer;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card {
  background:rgba(30,41,59,0.6);
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  backdrop-filter: blur(10px);
}

.input-box {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
}

.bar {
  height:10px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}

.fill {
  height:100%;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">🚀 NorthSky</div>
  <button onclick="upgrade()">Upgrade</button>
</div>

<div class="container">

  <div class="card">
    <div class="input-box">
      <input id="urlInput" placeholder="Paste URL..." />
      <button onclick="runAI()">Analyze</button>
    </div>
  </div>

  <div id="output"></div>

</div>

<script>
const API = "https://northsky-ai.onrender.com";

/* SAFE FETCH WRAPPER */
async function safeFetch(url) {
  try {
    const res = await fetch(url);
    return await res.json();
  } catch (e) {
    return { success: false, error: "Network error" };
  }
}

/* ANALYZE */
async function runAI() {
  const url = document.getElementById("urlInput").value.trim();
  const output = document.getElementById("output");

  if (!url) return;

  output.innerHTML = "<div class='card'>Analyzing...</div>";

  const data = await safeFetch(
    `${API}/api/rip?url=${encodeURIComponent(url)}`
  );

  render(data);
}

/* RENDER (SAFE VERSION) */
function render(data) {
  const meta = data.metadata || {};
  const score = Math.floor(Math.random() * 7 + 3);

  document.getElementById("output").innerHTML = `
    <div class="card">
      <h2>${escapeHtml(meta.title || "No title")}</h2>
      <p>${escapeHtml(meta.description || "No description")}</p>

      <h3>Viral Score: ${score}/10</h3>
      <div class="bar">
        <div class="fill" style="width:${score * 10}%"></div>
      </div>
    </div>
  `;
}

/* ESCAPE HTML (IMPORTANT SECURITY FIX) */
function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

/* HISTORY */
function upgrade() {
  alert("Upgrade system coming soon");
}
</script>

</body>
</html>
