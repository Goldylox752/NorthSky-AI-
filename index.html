<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky AI | Capture More Leads Automatically</title>

<style>
:root {
  --bg:#020617;
  --card:#1e293b;
  --text:#f8fafc;
  --accent:#38bdf8;
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
  text-align:center;
}

.container{
  max-width:650px;
  margin:auto;
  padding:25px 18px;
}

h1{
  color:var(--accent);
  font-size:2.4rem;
}

.card{
  background:var(--card);
  padding:22px;
  border-radius:14px;
  margin-top:20px;
}

.btn{
  width:100%;
  padding:16px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  font-weight:bold;
  cursor:pointer;
}

.small{font-size:0.9rem;opacity:0.85;}
.price{font-size:2.4rem;color:#facc15;}
.strike{text-decoration:line-through;opacity:0.6;}
.badge{color:#22c55e;font-size:0.9rem;}
.urgent{color:#ef4444;font-weight:bold;}

textarea,input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

#output{
  margin-top:15px;
  background:#0f172a;
  padding:12px;
  border-radius:8px;
  min-height:60px;
}
</style>
</head>

<body>

<div class="container">

<h1>Stop Losing $1,000+ in Missed Leads</h1>
<p class="small">AI replies instantly, follows up, and converts leads 24/7.</p>

<!-- 💰 OFFER -->
<div class="card">
<h2>🔥 AI Lead System</h2>

<p class="strike">$499</p>
<p class="price">$99</p>

<a href="https://buy.stripe.com/fZu7sE5uH4mwbc36762ZO0s?success_url=https://north-sky-ai.vercel.app/success">
  <button class="btn">🚀 Get Access</button>
</a>
</div>

<!-- 🤖 AI TOOL -->
<div class="card">
<h3>🤖 AI Analyzer Tool</h3>

<select id="mode">
  <option value="sales">💰 Sales Reply Mode</option>
  <option value="competitor">📊 Competitor Analysis</option>
</select>

<textarea id="lead" placeholder="Paste a message OR website URL..."></textarea>

<button onclick="runAI()" class="btn">Run AI</button>

<div id="output"></div>
</div>

<!-- 🔑 API TEST -->
<div class="card">
<h3>🔑 API Test</h3>

<input id="apiKey" placeholder="Enter API key" />
<button onclick="callAPI()" class="btn">Run API</button>

<p id="result" class="small"></p>
</div>

</div>

<script>
// 🔍 URL CHECK
function isURL(str) {
  return str.startsWith("http://") || str.startsWith("https://");
}

// 🧠 BUILD INPUT
async function buildInputData(input, output) {
  let inputData = input;
  const mode = document.getElementById("mode").value;

  if (isURL(input)) {
    output.innerText = "Analyzing website... 🔍";

    try {
      const res = await fetch('/api/scrape', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ url: input })
      });

      const data = await res.json();

      if (!res.ok) {
        output.innerText = "Scrape failed";
        return null;
      }

      if (mode === "sales") {
        inputData = `
You are an AI sales expert.

Business:
${data.title || data.ogTitle}

${data.description}

Task:
1. What they do
2. Who they target
3. Write a high-converting reply
`;
      }

      if (mode === "competitor") {
        inputData = `
You are a marketing expert.

Business:
${data.title || data.ogTitle}

${data.description}

Task:
1. Strengths
2. Weaknesses
3. How to beat them
4. Better sales pitch
`;
      }

    } catch {
      output.innerText = "Error scraping site";
      return null;
    }
  }

  return inputData;
}

// 🚀 RUN AI
async function runAI() {
  const input = document.getElementById("lead").value;
  const output = document.getElementById("output");

  if (!input) {
    output.innerText = "Enter input";
    return;
  }

  const inputData = await buildInputData(input, output);
  if (!inputData) return;

  output.innerText = "Thinking... 🤖";

  try {
    const res = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ message: inputData })
    });

    const data = await res.json();

    output.innerText = res.ok ? data.reply : (data.error || "Error");

  } catch {
    output.innerText = "Connection failed";
  }
}

// 🔑 API TEST
async function callAPI() {
  const key = document.getElementById('apiKey').value;
  const result = document.getElementById('result');

  if (!key) {
    result.innerText = "Enter API key";
    return;
  }

  result.innerText = "Testing...";

  try {
    const res = await fetch('/api/rip', {
      method:'GET',
      headers:{'x-api-key':key}
    });

    const data = await res.json();
    result.innerText = res.ok ? "API working ✅" : "Invalid key";

  } catch {
    result.innerText = "Connection failed";
  }
}
</script>

</body>
</html>
