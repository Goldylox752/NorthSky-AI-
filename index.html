<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky Intelligence</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

.hero {
  text-align: center;
  padding: 40px 20px;
}

.hero h1 {
  font-size: 34px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.8;
  font-size: 16px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-top: 20px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.primary {
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  color: white;
}

#output {
  margin-top: 20px;
  padding: 20px;
  background: #0f172a;
  border-radius: 10px;
}

.loader {
  text-align: center;
  margin-top: 20px;
  display: none;
}

.features {
  margin-top: 20px;
  opacity: 0.85;
  font-size: 14px;
}

.usage {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.7;
}

.history {
  margin-top: 30px;
  font-size: 14px;
  opacity: 0.8;
}

.history div {
  cursor: pointer;
  padding: 5px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>Turn Any Website Into Actionable Intelligence</h1>
    <p>Analyze competitors, extract insights, and generate AI reports in seconds.</p>
  </div>

  <!-- INPUT -->
  <input id="lead" placeholder="Enter a website URL (e.g. nike.com)" />
  <button class="primary" onclick="runAI()">Analyze Website</button>

  <!-- VALUE -->
  <div class="features">
    <p>✔ Extract key insights instantly</p>
    <p>✔ Understand competitors</p>
    <p>✔ AI-powered analysis</p>
  </div>

  <!-- USAGE -->
  <div class="usage" id="usage"></div>

  <!-- LOADER -->
  <div class="loader" id="loader">⚡ Generating AI report...</div>

  <!-- OUTPUT -->
  <div id="output">Ready.</div>

  <!-- HISTORY -->
  <div class="history" id="history"></div>

</div>

<script>
const API_URL = "https://northsky-ai.onrender.com";

/* INIT */
if (!localStorage.getItem("api_key")) {
  localStorage.setItem("api_key", "your-super-secret-key");
}
if (!localStorage.getItem("usage")) {
  localStorage.setItem("usage", "0");
}
if (!localStorage.getItem("history")) {
  localStorage.setItem("history", JSON.stringify([]));
}

updateUsage();
renderHistory();

/* MAIN */
async function runAI() {
  const input = document.getElementById("lead").value;
  const output = document.getElementById("output");
  const loader = document.getElementById("loader");

  if (!input.trim()) {
    output.innerText = "Enter a website URL";
    return;
  }

  loader.style.display = "block";
  output.innerText = "";

  try {
    const res = await fetch(
      `${API_URL}/rip?url=${encodeURIComponent(input)}`,
      {
        headers: {
          "x-api-key": localStorage.getItem("api_key")
        }
      }
    );

    const data = await res.json();
    loader.style.display = "none";

    if (!res.ok) {
      output.innerText = data?.error || "Something went wrong";
      return;
    }

    /* AI MODE */
    if (data?.analysis) {
      output.innerHTML = `
        <h2>🧠 Intelligence Report</h2>
        <div style="margin-top:10px; line-height:1.6;">
          ${data.analysis}
        </div>
      `;

      saveHistory(input);
      incrementUsage();
      return;
    }

    /* FALLBACK */
    const title = data?.title || "No title";
    const description = data?.description || "No description";
    const image = data?.thumbnail;

    output.innerHTML = `
      <h3>${title}</h3>
      <p>${description}</p>
      ${image ? `<img src="${image}" style="max-width:100%; border-radius:10px;" />` : ""}
    `;

    saveHistory(input);
    incrementUsage();

  } catch (e) {
    loader.style.display = "none";
    output.innerText = "Connection failed";
  }
}

/* HISTORY */
function saveHistory(url) {
  let history = JSON.parse(localStorage.getItem("history"));
  history.unshift(url);
  history = history.slice(0, 5);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("history"));
  const el = document.getElementById("history");

  el.innerHTML = "<h4>Recent Searches</h4>" +
    history.map(h => `<div onclick="reuse('${h}')">${h}</div>`).join("");
}

function reuse(url) {
  document.getElementById("lead").value = url;
}

/* USAGE */
function incrementUsage() {
  let usage = parseInt(localStorage.getItem("usage"));
  usage++;
  localStorage.setItem("usage", usage);
  updateUsage();
}

function updateUsage() {
  const usage = localStorage.getItem("usage");
  document.getElementById("usage").innerText =
    `Usage: ${usage}/100 requests`;
}
</script>

</body>
</html>
