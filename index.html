<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NorthSky Intelligence</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

.hero {
  text-align: center;
  padding: 40px 10px;
}

.hero h1 {
  font-size: 36px;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.primary {
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  color: white;
}

.buy {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
}

#output {
  margin-top: 20px;
  padding: 15px;
  background: #0f172a;
  border-radius: 10px;
  min-height: 120px;
}

img {
  max-width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.paywall {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}

.paywall-box {
  background: #111827;
  padding: 30px;
  border-radius: 14px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>🌌 NorthSky Intelligence</h1>
    <p>Turn any website into AI-powered intelligence instantly</p>
  </div>

  <input id="lead" placeholder="Enter website URL..." />

  <button class="primary" onclick="runAI()">Generate Report</button>
  <button class="buy" onclick="buyAccess()">💳 Unlock Full Access - $20</button>

  <div id="output">Ready.</div>

</div>

<div id="paywall" class="paywall">
  <div class="paywall-box">
    <h2>🔒 Access Locked</h2>
    <button class="buy" onclick="buyAccess()">Unlock Now</button>
  </div>
</div>

<script>
const API_URL = "https://YOUR-RENDER-APP.onrender.com";
const STRIPE_LINK = "https://buy.stripe.com/28E14gcX91ak2FxgLK2ZO0x";

/* ---------------- PAYWALL ---------------- */
function showPaywall() {
  document.getElementById("paywall").style.display = "flex";
}

function buyAccess() {
  window.location.href = STRIPE_LINK;
}

/* ---------------- TEMP KEY (for testing) ---------------- */
// REMOVE THIS LATER
if (!localStorage.getItem("api_key")) {
  localStorage.setItem("api_key", "your-super-secret-key");
}

/* ---------------- MAIN FUNCTION ---------------- */
async function runAI() {
  const input = document.getElementById("lead").value;
  const output = document.getElementById("output");

  if (!input.trim()) {
    output.innerText = "Enter a website URL";
    return;
  }

  const apiKey = localStorage.getItem("api_key");

  if (!apiKey) {
    showPaywall();
    return;
  }

  output.innerText = "Analyzing...";

  try {
    const res = await fetch(
      `${API_URL}/rip?url=${encodeURIComponent(input)}`,
      {
        headers: {
          "x-api-key": apiKey
        }
      }
    );

    const data = await res.json();

    if (!res.ok) {
      output.innerText = data.error || "Failed";
      return;
    }

    output.innerHTML = `
      <h3>${data.title || "No title"}</h3>
      <p>${data.description || "No description"}</p>
      ${data.thumbnail ? `<img src="${data.thumbnail}" />` : ""}
      <small>Source: ${data.source}</small>
    `;

  } catch (e) {
    output.innerText = "Connection failed";
  }
}
</script>

</body>
</html>
