<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NorthSky Intelligence</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: #e5e7eb;
}

.container { max-width: 900px; margin: auto; padding: 28px; }

.hero { text-align: center; padding: 40px 10px; }

.hero h1 { color: #38bdf8; font-size: 34px; }

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
}

button { cursor: pointer; font-weight: bold; }

.primary { background: #38bdf8; color: black; }
.buy { background: #22c55e; color: black; }

#output {
  margin-top: 20px;
  padding: 15px;
  background: #0f172a;
  border-radius: 10px;
  min-height: 80px;
  white-space: pre-wrap;
}

/* PAYWALL */
.paywall {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
}

.paywall-box {
  background: #111827;
  padding: 30px;
  border-radius: 14px;
  text-align: center;
  max-width: 420px;
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>🌌 NorthSky Intelligence</h1>
    <p>Turn any website into intelligence instantly</p>
  </div>

  <input id="lead" placeholder="Enter website URL or business..." />

  <button class="primary" onclick="runAI()">Generate Report</button>
  <button class="buy" onclick="buyAccess()">💳 Unlock Access</button>

  <div id="output">Ready.</div>

</div>

<!-- PAYWALL -->
<div id="paywall" class="paywall">
  <div class="paywall-box">
    <h2>🔒 Access Locked</h2>
    <p>Unlock to continue</p>
    <button class="buy" onclick="buyAccess()">Unlock</button>
  </div>
</div>

<script>
const STRIPE_LINK = "https://buy.stripe.com/fZueV63mz4mw2Fx2UU2ZO0w";

/* ---------------- PAYWALL ---------------- */

function showPaywall() {
  document.getElementById("paywall").style.display = "flex";
}

function hidePaywall() {
  document.getElementById("paywall").style.display = "none";
}

/* ---------------- STRIPE ---------------- */

function buyAccess() {
  window.location.href = STRIPE_LINK;
}

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {
  if (!localStorage.getItem("api_key")) {
    showPaywall();
    document.getElementById("output").innerText = "🔒 Locked";
  }
});

/* ---------------- MAIN FUNCTION ---------------- */

async function runAI() {
  const input = document.getElementById("lead").value;
  const output = document.getElementById("output");

  if (!input.trim()) {
    output.innerText = "Enter input";
    return;
  }

  const apiKey = localStorage.getItem("api_key");

  if (!apiKey) {
    showPaywall();
    return;
  }

  output.innerText = "Analyzing...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey
      },
      body: JSON.stringify({ message: input })
    });

    const data = await res.json();

    if (!res.ok) {
      showPaywall();
      output.innerText = data.error || "Access denied";
      return;
    }

    output.innerText = data.reply;

  } catch (e) {
    output.innerText = "Connection failed";
  }
}
</script>

</body>
</html>
