<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NorthSky AI Platform v3</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  font-weight:600;
}

.logo {
  font-size:18px;
}

.tabs {
  display:flex;
  gap:10px;
}

.tab {
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  opacity:0.6;
  transition:0.2s;
  border:1px solid transparent;
}

.tab.active {
  opacity:1;
  border:1px solid #3b82f6;
  background:rgba(59,130,246,0.15);
}

/* HERO */
.hero {
  text-align:center;
  margin-top:80px;
}

.hero h1 {
  font-size:42px;
}

.hero p {
  opacity:0.6;
}

/* INPUT */
.box {
  display:flex;
  justify-content:center;
  margin-top:25px;
}

.box input {
  width:60%;
  padding:16px;
  border-radius:12px;
  border:none;
  background:#0f172a;
  color:white;
  outline:none;
}

.box button {
  padding:16px 20px;
  margin-left:10px;
  border-radius:12px;
  border:none;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-weight:600;
}

/* OUTPUT */
.output {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:rgba(15,23,42,0.6);
  border-radius:16px;
  display:none;
  backdrop-filter:blur(10px);
}

/* SEARCH CARDS */
.card {
  padding:14px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.03);
}

.small {
  opacity:0.6;
  font-size:13px;
}

/* CHAT */
.chat {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg {
  padding:12px;
  border-radius:12px;
}

.user {
  background:#3b82f6;
  align-self:flex-end;
}

.ai {
  background:#1e293b;
  align-self:flex-start;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">NorthSky AI</div>

  <div class="tabs">
    <div class="tab active" onclick="setMode('analyze')">Analyze</div>
    <div class="tab" onclick="setMode('search')">Search</div>
    <div class="tab" onclick="setMode('ask')">Ask</div>
  </div>
</div>

<div class="hero">
  <h1>NorthSky AI Platform</h1>
  <p>Analyze • Search • Ask Anything</p>
</div>

<div class="box">
  <input id="input" placeholder="Enter URL, search, or question..." />
  <button onclick="run()">Run</button>
</div>

<div id="output" class="output"></div>

<script>

let mode = "analyze";

function setMode(m){
  mode = m;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");

  document.getElementById("output").style.display = "none";
  document.getElementById("output").innerHTML = "";
}

/* MAIN ROUTER */
async function run(){
  const input = document.getElementById("input").value.trim();
  const out = document.getElementById("output");

  if(!input) return;

  out.style.display = "block";
  out.innerHTML = "⏳ Processing...";

  try {

    /* ================= ANALYZE MODE ================= */
    if(mode === "analyze"){
      const res = await fetch(`/api/rip?url=${encodeURIComponent(input)}`);
      const data = await res.json();

      if(!data.success){
        out.innerHTML = "❌ Failed";
        return;
      }

      const m = data.metadata;

      out.innerHTML = `
        <h2>${m.title}</h2>
        <p class="small">${m.site}</p>
        <p>${m.description}</p>
        ${m.image ? `<img src="${m.image}" style="width:100%;border-radius:12px;margin-top:10px;">` : ""}
      `;
    }

    /* ================= SEARCH MODE ================= */
    if(mode === "search"){
      const res = await fetch(`/api/search?q=${encodeURIComponent(input)}`);
      const data = await res.json();

      if(!data.results){
        out.innerHTML = "❌ No results";
        return;
      }

      out.innerHTML = `<h3>Search Results</h3>`;

      data.results.forEach(r=>{
        out.innerHTML += `
          <div class="card">
            <strong>${r.title || "Result"}</strong>
            <div class="small">${r.site || r.url}</div>
            <p class="small">${r.description || ""}</p>
          </div>
        `;
      });
    }

    /* ================= ASK MODE ================= */
    if(mode === "ask"){
      const res = await fetch(`/api/ask?q=${encodeURIComponent(input)}`);
      const data = await res.json();

      out.innerHTML = `
        <div class="chat">
          <div class="msg user">${input}</div>
          <div class="msg ai">${JSON.stringify(data, null, 2)}</div>
        </div>
      `;
    }

  } catch(e){
    out.innerHTML = "❌ Error connecting to server";
  }
}

/* ENTER SUPPORT */
document.getElementById("input").addEventListener("keypress",(e)=>{
  if(e.key==="Enter") run();
});

</script>

</body>
</html>
