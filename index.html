<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NorthSky AI Platform v3 Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
}

/* TOP BAR */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  font-weight:600;
}

.logo { font-size:18px; }

.badge {
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.2);
  font-size:12px;
  opacity:0.8;
}

/* HERO */
.hero {
  text-align:center;
  margin-top:70px;
}

.hero h1 { font-size:42px; }
.hero p { opacity:0.6; }

/* INPUT */
.box {
  display:flex;
  justify-content:center;
  margin-top:25px;
  gap:10px;
  padding:0 20px;
}

.box input {
  width:60%;
  padding:16px;
  border-radius:12px;
  border:none;
  background:#0f172a;
  color:white;
}

.box button {
  padding:16px 20px;
  border-radius:12px;
  border:none;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-weight:600;
}

/* OUTPUT */
.output {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:rgba(15,23,42,0.6);
  border-radius:16px;
  display:none;
}

/* LOCK SCREEN */
.lock {
  text-align:center;
  margin-top:60px;
}

.lock button {
  padding:14px 18px;
  border-radius:12px;
  border:none;
  background:#22c55e;
  color:black;
  font-weight:700;
  cursor:pointer;
}

/* CHAT */
.chat {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg {
  padding:12px;
  border-radius:12px;
}

.user { background:#3b82f6; align-self:flex-end; }
.ai { background:#1e293b; align-self:flex-start; }

.tabbar {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.tab {
  padding:8px 14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  opacity:0.6;
}

.tab.active {
  opacity:1;
  background:rgba(59,130,246,0.2);
  border-color:#3b82f6;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">NorthSky AI</div>
  <div class="badge" id="planBadge">FREE</div>
</div>

<!-- LOCKED VIEW -->
<div id="locked" class="lock">
  <h1>🔒 Pro Required</h1>
  <p>Unlock NorthSky AI for $29/month</p>
  <button onclick="subscribe()">Upgrade to Pro</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="tabbar">
    <div class="tab active" onclick="mode='analyze'">Analyze</div>
    <div class="tab" onclick="mode='search'">Search</div>
    <div class="tab" onclick="mode='ask'">Ask</div>
  </div>

  <div class="hero">
    <h1>NorthSky AI Platform</h1>
    <p>Analyze • Search • Ask Anything</p>
  </div>

  <div class="box">
    <input id="input" placeholder="Enter URL or question..." />
    <button onclick="run()">Run</button>
  </div>

  <div id="output" class="output"></div>
</div>

<script>

const STRIPE_URL = "https://buy.stripe.com/fZu8wI2iv5qA2Fx0MM2ZO0z";

let mode = "analyze";
let isPro = localStorage.getItem("northsky_pro") === "true";

/* INIT */
window.onload = () => {
  if(isPro) unlockUI();
};

/* SUBSCRIBE */
function subscribe(){
  window.location.href = STRIPE_URL;
}

/* AFTER PAYMENT (manual return trigger) */
if(window.location.href.includes("success")){
  localStorage.setItem("northsky_pro","true");
  unlockUI();
}

/* UNLOCK UI */
function unlockUI(){
  document.getElementById("locked").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("planBadge").innerText = "PRO";
  isPro = true;
}

/* RUN */
async function run(){
  const input = document.getElementById("input").value;
  const out = document.getElementById("output");

  if(!input) return;

  out.style.display = "block";
  out.innerHTML = "⏳ Processing...";

  let endpoint = "";

  if(mode === "analyze") endpoint = "/api/rip?url=" + encodeURIComponent(input);
  if(mode === "search") endpoint = "/api/search?q=" + encodeURIComponent(input);
  if(mode === "ask") endpoint = "/api/ask?q=" + encodeURIComponent(input);

  const res = await fetch(endpoint);
  const data = await res.json();

  if(mode === "ask"){
    out.innerHTML = `<div class="chat">
      <div class="msg user">${input}</div>
      <div class="msg ai">${data.answer || JSON.stringify(data)}</div>
    </div>`;
  } else {
    out.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
  }
}

</script>

</body>
</html>
