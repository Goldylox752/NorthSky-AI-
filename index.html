<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NorthSky AI Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo { font-weight:700; }

.badge {
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.2);
  font-size:12px;
}

/* HERO */
.hero {
  text-align:center;
  margin-top:60px;
}

.hero h1 { font-size:42px; }
.hero p { opacity:0.6; }

/* INPUT */
.box {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:25px;
}

.box input {
  width:60%;
  padding:16px;
  border-radius:12px;
  border:none;
  background:#0f172a;
  color:white;
  outline:none;
}

.box button {
  padding:16px 20px;
  border-radius:12px;
  border:none;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-weight:600;
}

/* OUTPUT */
.output {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:rgba(15,23,42,0.6);
  border-radius:16px;
  display:none;
}

/* TABS */
.tabbar {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.tab {
  padding:8px 14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  opacity:0.6;
}

.tab.active {
  opacity:1;
  background:rgba(59,130,246,0.2);
  border-color:#3b82f6;
}

/* CHAT */
.chat {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg {
  padding:12px;
  border-radius:12px;
}

.user { background:#3b82f6; align-self:flex-end; }
.ai { background:#1e293b; align-self:flex-start; }

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">NorthSky AI</div>
  <div class="badge" id="plan">FREE</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>NorthSky AI</h1>
  <p>DeepSeek + OpenAI Multi-Model System</p>
</div>

<!-- TABS -->
<div class="tabbar">
  <div class="tab active">analyze</div>
  <div class="tab">search</div>
  <div class="tab">ask</div>
</div>

<!-- INPUT -->
<div class="box">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="run()">Run</button>
</div>

<!-- OUTPUT -->
<div id="output" class="output"></div>

<script>

let mode = "analyze";

/* TAB SWITCH */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    mode = tab.innerText.toLowerCase();
  });
});

/* MAIN AI CALL (DeepSeek + OpenAI router backend) */
async function run() {
  const input = document.getElementById("input").value;
  const out = document.getElementById("output");

  if (!input) return;

  out.style.display = "block";
  out.innerHTML = "⏳ Thinking...";

  try {
    const res = await fetch("/api/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": localStorage.getItem("northsky_key") || ""
      },
      body: JSON.stringify({
        prompt: input,
        task:
          mode === "analyze" ? "analysis" :
          mode === "search" ? "reasoning" :
          "chat"
      })
    });

    const data = await res.json();

    if (!res.ok) {
      out.innerHTML = `<div class="msg ai">❌ ${data.error}</div>`;
      return;
    }

    out.innerHTML = `
      <div class="chat">
        <div class="msg user">${input}</div>
        <div class="msg ai">
          🤖 ${data.provider} (${data.model})<br><br>
          ${data.reply}
        </div>
      </div>
    `;

  } catch (err) {
    out.innerHTML = `<div class="msg ai">⚠️ ${err.message}</div>`;
  }
}

</script>

</body>
</html>
