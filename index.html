<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NorthSky Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo { font-weight:700; }

button {
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover { opacity:0.9; }

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card {
  background:rgba(30,41,59,0.6);
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  backdrop-filter: blur(10px);
}

.input-box {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
  outline:none;
}

.bar {
  height:10px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.fill {
  height:100%;
  background:#22c55e;
  width:0%;
  transition:0.3s;
}

.preview-img {
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:12px;
  margin-top:10px;
}

.small {
  opacity:0.7;
  font-size:13px;
}

.loading {
  opacity:0.7;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { opacity:0.4; }
  50% { opacity:1; }
  100% { opacity:0.4; }
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">🚀 NorthSky SaaS</div>
  <button onclick="upgrade()">Upgrade</button>
</div>

<div class="container">

  <div class="card">
    <div class="input-box">
      <input id="urlInput" placeholder="Paste URL..." />
      <button onclick="runAI()">Analyze</button>
    </div>
    <div class="small">Example: https://example.com</div>
  </div>

  <div id="output"></div>

</div>

<script>
const API = "https://northsky-ai.onrender.com";

/* SAFE FETCH */
async function safeFetch(url) {
  try {
    const res = await fetch(url);
    return await res.json();
  } catch (e) {
    return { success: false, error: "Network error" };
  }
}

/* LOADING UI */
function loadingUI() {
  document.getElementById("output").innerHTML = `
    <div class="card loading">Analyzing URL...</div>
  `;
}

/* MAIN FUNCTION */
async function runAI() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) return;

  loadingUI();

  const data = await safeFetch(
    `${API}/api/rip?url=${encodeURIComponent(url)}`
  );

  render(data);
}

/* RENDER UI */
function render(data) {
  const meta = data.metadata;

  if (!data.success || !meta) {
    document.getElementById("output").innerHTML = `
      <div class="card">
        ❌ Failed to load preview
        <div class="small">${data.error || "Unknown error"}</div>
      </div>
    `;
    return;
  }

  const score = calculateScore(meta);

  document.getElementById("output").innerHTML = `
    <div class="card">

      ${meta.image ? `<img class="preview-img" src="${meta.image}" />` : ""}

      <h2>${escapeHtml(meta.title || "No title")}</h2>

      <p>${escapeHtml(meta.description || "No description available")}</p>

      <div class="small">Site: ${escapeHtml(meta.site || "")}</div>

      <h3 style="margin-top:15px;">Quality Score: ${score}/10</h3>

      <div class="bar">
        <div class="fill" style="width:${score * 10}%"></div>
      </div>

    </div>
  `;
}

/* REALISTIC SCORING (NOT FAKE RANDOM) */
function calculateScore(meta) {
  let score = 5;

  if (meta.title && meta.title.length > 10) score += 2;
  if (meta.description && meta.description.length > 50) score += 2;
  if (meta.image) score += 1;

  return Math.min(score, 10);
}

/* SECURITY */
function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

/* UPGRADE BUTTON */
function upgrade() {
  alert("Stripe upgrade system connects in SaaS backend mode");
}
</script>

</body>
</html>
