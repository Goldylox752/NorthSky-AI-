<script>
// 🔍 URL CHECK
function isURL(str) {
  return str.startsWith("http://") || str.startsWith("https://");
}

// 📸 SCREENSHOT
function getScreenshot(url) {
  return `https://image.thum.io/get/fullpage/${url}`;
}

// 🧠 BUILD INPUT + PREVIEW
async function buildInputData(input, output) {
  let inputData = input;
  const mode = document.getElementById("mode").value;

  const previewCard = document.getElementById("previewCard");
  const ogImageEl = document.getElementById("ogImage");
  const screenshotEl = document.getElementById("screenshot");

  // RESET PREVIEW
  previewCard.style.display = "none";
  ogImageEl.style.display = "none";
  screenshotEl.src = "";

  if (isURL(input)) {
    output.innerText = "Analyzing website... 🔍";

    try {
      const res = await fetch('/api/scrape', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ url: input })
      });

      const data = await res.json();

      if (!res.ok) {
        output.innerText = "Scrape failed";
        return null;
      }

      // ✅ SAFE KEYWORDS
      const keywords = data.keywords || [];

      // 🔥 SHOW PREVIEW
      previewCard.style.display = "block";

      if (data.ogImage) {
        ogImageEl.src = data.ogImage;
        ogImageEl.style.display = "block";
      }

      screenshotEl.src = getScreenshot(input);

      // 🧠 SALES MODE
      if (mode === "sales") {
        inputData = `
You are an AI sales expert.

Business:
${data.title || data.ogTitle}

Description:
${data.description}

Keywords:
${keywords.join(", ")}

Task:
1. What they do
2. Who they target
3. Write a high-converting reply
`;
      }

      // 🧠 COMPETITOR MODE
      else if (mode === "competitor") {
        inputData = `
You are a marketing expert.

Business:
${data.title || data.ogTitle}

Description:
${data.description}

Keywords:
${keywords.join(", ")}

Task:
1. Strengths
2. Weaknesses
3. How to beat them
4. Better sales pitch
`;
      }

    } catch {
      output.innerText = "Error scraping site";
      return null;
    }
  }

  return inputData;
}

// 🚀 RUN AI
async function runAI() {
  const input = document.getElementById("lead").value;
  const output = document.getElementById("output");

  if (!input) {
    output.innerText = "Enter input";
    return;
  }

  const inputData = await buildInputData(input, output);
  if (!inputData) return;

  output.innerText = "Thinking... 🤖";

  try {
    const res = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ message: inputData })
    });

    const data = await res.json();
    output.innerText = res.ok ? data.reply : "Error";

  } catch {
    output.innerText = "Connection failed";
  }
}
</script>
