<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NorthSky AI Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo { font-weight:700; }

.badge {
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.2);
  font-size:12px;
}

/* HERO */
.hero {
  text-align:center;
  margin-top:50px;
}

.hero h1 { font-size:44px; }
.hero p { opacity:0.6; }

/* PAYWALL */
.paywall {
  max-width:800px;
  margin:40px auto;
  text-align:center;
}

.plan {
  background:#0f172a;
  padding:18px;
  margin:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
}

.price {
  font-size:18px;
  font-weight:700;
  color:#22c55e;
}

.plan button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-weight:600;
}

.unlock {
  background:#22c55e !important;
}

/* INPUT */
.box {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:25px;
}

.box input {
  width:60%;
  padding:16px;
  border-radius:12px;
  border:none;
  background:#0f172a;
  color:white;
}

.box button {
  padding:16px 20px;
  border-radius:12px;
  border:none;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-weight:600;
}

/* OUTPUT */
.output {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:rgba(15,23,42,0.6);
  border-radius:16px;
  display:none;
}

/* CHAT */
.chat {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg {
  padding:12px;
  border-radius:12px;
}

.user { background:#3b82f6; align-self:flex-end; }
.ai { background:#1e293b; align-self:flex-start; }

.hidden { display:none; }

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">NorthSky AI</div>
  <div class="badge" id="planBadge">FREE</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>NorthSky AI</h1>
  <p>AI Lead Engine + Roofing Territory System</p>
</div>

<!-- 🔒 PAYWALL -->
<div id="paywall" class="paywall">

  <h2>Unlock Full Access</h2>
  <p>Choose your plan to activate AI system</p>

  <div class="plan">
    <h3>Starter</h3>
    <div class="price">$99</div>
    <p>Basic AI access</p>
    <a href="https://buy.stripe.com/dRmfZae1d2eoeofgLK2ZO0C">
      <button>Buy Starter</button>
    </a>
  </div>

  <div class="plan">
    <h3>Pro (Recommended)</h3>
    <div class="price">$299</div>
    <p>Full AI workflow + leads</p>
    <a href="https://buy.stripe.com/aFaeV6cX97yIfsjcvu2ZO0E">
      <button>Buy Pro</button>
    </a>
  </div>

  <div class="plan">
    <h3>Elite</h3>
    <div class="price">$999</div>
    <p>Exclusive territory + priority AI</p>
    <a href="https://buy.stripe.com/dRm28k8GTaKU1Btcvu2ZO0D">
      <button>Buy Elite</button>
    </a>
  </div>

  <button class="unlock" onclick="unlockAccess()">
    I’ve Paid — Continue
  </button>

</div>

<!-- 🔓 APP -->
<div id="app" class="hidden">

  <div class="box">
    <input id="input" placeholder="Ask anything..." />
    <button onclick="run()">Run</button>
  </div>

  <div id="output" class="output"></div>

</div>

<script>

let mode = "analyze";

/* CHECK ACCESS */
function unlockAccess(){
  localStorage.setItem("northsky_paid", "true");
  document.getElementById("paywall").style.display = "none";
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("planBadge").innerText = "PRO";
}

window.onload = () => {
  if(localStorage.getItem("northsky_paid") === "true"){
    unlockAccess();
  }
};

/* AI RUN */
async function run() {

  if(localStorage.getItem("northsky_paid") !== "true"){
    alert("Please purchase a plan to continue.");
    return;
  }

  const input = document.getElementById("input").value;
  const out = document.getElementById("output");

  if (!input) return;

  out.style.display = "block";
  out.innerHTML = "⏳ Thinking...";

  try {
    const res = await fetch("/api/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": localStorage.getItem("northsky_key") || "",
        "x-user-email": localStorage.getItem("northsky_email") || ""
      },
      body: JSON.stringify({
        message: input,
        mode: mode
      })
    });

    const data = await res.json();

    if (!res.ok) {
      out.innerHTML = `<div class="msg ai">❌ ${data.error}</div>`;
      return;
    }

    out.innerHTML = `
      <div class="chat">
        <div class="msg user">${input}</div>
        <div class="msg ai">
          🤖 ${data.plan.toUpperCase()} USER<br><br>
          ${data.reply}
        </div>
      </div>
    `;

  } catch (err) {
    out.innerHTML = `<div class="msg ai">⚠️ ${err.message}</div>`;
  }
}

</script>

</body>
</html>
