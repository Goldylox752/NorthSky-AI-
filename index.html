<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NorthSky Intelligence | Lead Intelligence Engine</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: #e5e7eb;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 28px;
}

.hero {
  text-align: center;
  padding: 40px 10px 20px;
}

.hero h1 {
  font-size: 34px;
  color: #38bdf8;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button { cursor: pointer; font-weight: bold; }

.primary { background: #38bdf8; color: #000; }
.buy { background: #22c55e; color: #000; }

#output {
  margin-top: 20px;
  padding: 15px;
  background: #0f172a;
  border-radius: 10px;
  white-space: pre-wrap;
  min-height: 80px;
}

.card {
  background: #111827;
  padding: 16px;
  margin-top: 15px;
  border-radius: 12px;
  display: none;
}

.score-bar {
  height: 10px;
  background: #1f2937;
  border-radius: 10px;
  overflow: hidden;
}

.score-bar-inner {
  height: 100%;
  width: 0%;
  background: #38bdf8;
}

/* 🔒 PAYWALL OVERLAY */
.paywall {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.paywall-box {
  background: #111827;
  padding: 30px;
  border-radius: 14px;
  max-width: 420px;
}

.paywall-box h2 {
  color: #38bdf8;
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>🌌 NorthSky Intelligence</h1>
    <p>Turn any website into sales, SEO, and competitor intelligence.</p>
  </div>

  <input id="lead" placeholder="Enter website URL or business name..." />

  <select id="mode">
    <option value="sales">Sales Mode</option>
    <option value="competitor">Competitor Mode</option>
  </select>

  <button class="primary" onclick="runAI()">Generate Intelligence Report</button>
  <button class="buy" onclick="buyAccess()">💳 Unlock Full Access</button>

  <div id="output">Locked or Ready...</div>

  <div id="previewCard" class="card">
    <h3>Preview</h3>
    <img id="ogImage" />
    <img id="screenshot" />
  </div>

  <div id="scoreCard" class="card">
    <h3 id="scoreText"></h3>
    <div class="score-bar"><div id="scoreBar" class="score-bar-inner"></div></div>
    <p id="scoreReason"></p>
  </div>

</div>

<!-- 🔒 PAYWALL -->
<div id="paywall" class="paywall">
  <div class="paywall-box">
    <h2>🔒 Access Locked</h2>
    <p>Unlock full intelligence reports to continue.</p>
    <button class="buy" onclick="buyAccess()">Unlock for Access</button>
  </div>
</div>

<script>
const STRIPE_LINK = "https://buy.stripe.com/fZueV63mz4mw2Fx2UU2ZO0w";
let isPaid = localStorage.getItem("northsky_paid") === "true";

/* ---------------- PAYWALL CONTROL ---------------- */

function showPaywall() {
  document.getElementById("paywall").style.display = "flex";
}

function hidePaywall() {
  document.getElementById("paywall").style.display = "none";
}

/* ---------------- STRIPE ---------------- */

function buyAccess() {
  // mark intent (demo mode)
  localStorage.setItem("northsky_paid", "true");
  isPaid = true;

  hidePaywall();

  // redirect to Stripe checkout
  window.location.href = STRIPE_LINK;
}

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {
  if (!isPaid) {
    showPaywall();
    document.getElementById("output").innerText = "🔒 Locked — please unlock access.";
  } else {
    document.getElementById("output").innerText = "✅ Access unlocked.";
  }
});

/* ---------------- CORE LOGIC ---------------- */

function isURL(str) {
  return /^https?:\/\//i.test((str || "").trim());
}

function getScreenshot(url) {
  return `https://image.thum.io/get/fullpage/${encodeURIComponent(url)}`;
}

function calculateScore(data = {}) {
  let score = 0;
  let issues = [];

  if (data.title) score += 2; else issues.push("Missing title");
  if (data.description) score += 2; else issues.push("Missing meta description");
  if (data.ogImage) score += 2; else issues.push("Missing social image");
  if (data.content?.length > 800) score += 2; else issues.push("Thin content");

  return { score, percent: (score / 8) * 100, issues };
}

async function runAI() {
  if (!isPaid) {
    showPaywall();
    return;
  }

  const input = document.getElementById("lead").value;
  const output = document.getElementById("output");

  if (!input.trim()) {
    output.innerText = "Enter input";
    return;
  }

  if (isURL(input)) {
    output.innerText = "Analyzing...";

    try {
      const res = await fetch("/api/scrape", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: input })
      });

      const data = await res.json();

      document.getElementById("previewCard").style.display = "block";
      document.getElementById("ogImage").src = data.ogImage || "";
      document.getElementById("screenshot").src = getScreenshot(input);

      const score = calculateScore(data);

      document.getElementById("scoreCard").style.display = "block";
      document.getElementById("scoreBar").style.width = score.percent + "%";
      document.getElementById("scoreText").innerText = `Score: ${score.score}/8`;
      document.getElementById("scoreReason").innerText = score.issues.join(", ");

      output.innerText =
        `NorthSky Report\n\nTitle: ${data.title}\nDescription: ${data.description}`;

    } catch (e) {
      output.innerText = "Error analyzing site";
    }
  } else {
    output.innerText = "Please enter a valid URL";
  }
}
</script>

</body>
</html>
