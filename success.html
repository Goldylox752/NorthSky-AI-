<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Successful</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 50px;
}

.box {
  max-width: 500px;
  margin: auto;
}

button {
  margin-top: 20px;
  padding: 14px 28px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.code {
  background: #0f172a;
  padding: 12px;
  border-radius: 8px;
  margin-top: 15px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="box">
  <h1>🎉 Payment Successful</h1>
  <p>Your access is ready</p>

  <button onclick="getKey()">Get API Key</button>

  <div id="keyBox" class="code" style="display:none;"></div>

  <button onclick="goBack()" style="display:none;" id="continueBtn">
    Continue to App →
  </button>
</div>

<script>
async function getKey() {
  try {
    const res = await fetch('/api/create-key');
    const data = await res.json();

    // Save key locally
    localStorage.setItem("api_key", data.apiKey);

    // Show key to user
    document.getElementById("keyBox").style.display = "block";
    document.getElementById("keyBox").innerText = data.apiKey;

    document.getElementById("continueBtn").style.display = "inline-block";

  } catch (err) {
    alert("Failed to generate key");
  }
}

function goBack() {
  window.location.href = "/";
}
</script>

</body>
</html>
