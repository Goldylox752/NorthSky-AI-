<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Successful</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 50px;
}

.box {
  max-width: 500px;
  margin: auto;
}

.code {
  background: #0f172a;
  padding: 12px;
  border-radius: 8px;
  margin-top: 15px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="box">
  <h1>🎉 Payment Successful</h1>
  <p>Your access is ready</p>

  <div id="keyBox" class="code"></div>

  <p>Redirecting to dashboard...</p>
</div>

<script>
// ✅ Get API key from URL
const params = new URLSearchParams(window.location.search);
const apiKey = params.get("key");

if (apiKey) {
  // ✅ Save correctly (matches dashboard)
  localStorage.setItem("apiKey", apiKey);

  // Show key
  document.getElementById("keyBox").innerText = apiKey;

  // Redirect to dashboard
  setTimeout(() => {
    window.location.href = "/dashboard";
  }, 2000);

} else {
  document.getElementById("keyBox").innerText =
    "No API key found. Check your email.";
}
</script>

</body>
</html>
